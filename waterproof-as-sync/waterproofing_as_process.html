<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방수명장 AS대응 프로세스</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .chat-container {
            display: flex;
            height: 700px;
        }
        
        .sidebar {
            width: 280px;
            background: #f8f9fa;
            border-right: 2px solid #e0e0e0;
            overflow-y: auto;
        }
        
        .stage {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .stage:hover {
            background: #e9ecef;
        }
        
        .stage.active {
            background: #667eea;
            color: white;
            border-left: 5px solid #2a5298;
        }
        
        .stage-number {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: #2a5298;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            margin-right: 10px;
            font-weight: bold;
        }
        
        .stage.active .stage-number {
            background: white;
            color: #667eea;
        }
        
        .stage-title {
            font-weight: bold;
            font-size: 15px;
        }
        
        .stage-desc {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.8;
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #ffffff;
        }
        
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.bot {
            display: flex;
            align-items: flex-start;
        }
        
        .message.user {
            display: flex;
            justify-content: flex-end;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 18px;
        }
        
        .avatar.bot {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .avatar.user {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-right: 0;
            margin-left: 10px;
        }
        
        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
        }
        
        .message.bot .message-content {
            background: #f0f2f5;
            color: #333;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .option-btn {
            padding: 10px 20px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
        }
        
        .option-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }
        
        .form-group {
            margin: 15px 0;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .submit-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.3);
        }
        
        .checklist {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
        }
        
        .checklist-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #856404;
        }
        
        .checklist-item {
            padding: 8px 0;
            display: flex;
            align-items: center;
        }
        
        .checklist-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
        }
        
        .warning-box {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            color: #721c24;
        }
        
        .info-box {
            background: #d1ecf1;
            border-left: 4px solid #17a2b8;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            color: #0c5460;
        }
        
        .success-box {
            background: #d4edda;
            border-left: 4px solid #28a745;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            color: #155724;
        }
        
        .input-area {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 2px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
        }
        
        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-area button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }
        
        .table-responsive {
            overflow-x: auto;
            margin: 15px 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        
        table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }
        
        table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        table tr:hover {
            background: #f8f9fa;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-progress {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .status-complete {
            background: #d4edda;
            color: #155724;
        }
        
        .status-urgent {
            background: #f8d7da;
            color: #721c24;
        }

        .timeline {
            position: relative;
            padding: 20px 0;
            margin: 20px 0;
        }

        .timeline-item {
            position: relative;
            padding-left: 40px;
            padding-bottom: 30px;
            border-left: 2px solid #667eea;
        }

        .timeline-item:last-child {
            border-left: 2px solid transparent;
        }

        .timeline-dot {
            position: absolute;
            left: -8px;
            top: 0;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
        }

        .timeline-content {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
        }

        .timeline-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .timeline-time {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏗️ 방수명장 AS대응 프로세스</h1>
            <p>체계적인 방수 하자/누수 AS 접수부터 완료까지 전문 프로세스</p>
        </div>
        
        <div class="chat-container">
            <div class="sidebar">
                <div class="stage active" data-stage="1">
                    <span class="stage-number">1</span>
                    <div style="display: inline-block;">
                        <div class="stage-title">초기 접수</div>
                        <div class="stage-desc">고객 정보 및 증상 파악</div>
                    </div>
                </div>
                <div class="stage" data-stage="2">
                    <span class="stage-number">2</span>
                    <div style="display: inline-block;">
                        <div class="stage-title">긴급도 판단</div>
                        <div class="stage-desc">즉시 조치 필요 여부</div>
                    </div>
                </div>
                <div class="stage" data-stage="3">
                    <span class="stage-number">3</span>
                    <div style="display: inline-block;">
                        <div class="stage-title">현장 사전조사</div>
                        <div class="stage-desc">사진/도면/이력 확인</div>
                    </div>
                </div>
                <div class="stage" data-stage="4">
                    <span class="stage-number">4</span>
                    <div style="display: inline-block;">
                        <div class="stage-title">원인 1차 분석</div>
                        <div class="stage-desc">가능 원인 추정</div>
                    </div>
                </div>
                <div class="stage" data-stage="5">
                    <span class="stage-number">5</span>
                    <div style="display: inline-block;">
                        <div class="stage-title">현장 방문 계획</div>
                        <div class="stage-desc">일정/준비물 확정</div>
                    </div>
                </div>
                <div class="stage" data-stage="6">
                    <span class="stage-number">6</span>
                    <div style="display: inline-block;">
                        <div class="stage-title">현장 조사</div>
                        <div class="stage-desc">정밀 진단 수행</div>
                    </div>
                </div>
                <div class="stage" data-stage="7">
                    <span class="stage-number">7</span>
                    <div style="display: inline-block;">
                        <div class="stage-title">원인 확정</div>
                        <div class="stage-desc">진단 결과 보고</div>
                    </div>
                </div>
                <div class="stage" data-stage="8">
                    <span class="stage-number">8</span>
                    <div style="display: inline-block;">
                        <div class="stage-title">보수 방안 제시</div>
                        <div class="stage-desc">공법/견적 협의</div>
                    </div>
                </div>
                <div class="stage" data-stage="9">
                    <span class="stage-number">9</span>
                    <div style="display: inline-block;">
                        <div class="stage-title">시공 계획</div>
                        <div class="stage-desc">공정/일정 확정</div>
                    </div>
                </div>
                <div class="stage" data-stage="10">
                    <span class="stage-number">10</span>
                    <div style="display: inline-block;">
                        <div class="stage-title">시공 및 관리</div>
                        <div class="stage-desc">품질관리 수행</div>
                    </div>
                </div>
                <div class="stage" data-stage="11">
                    <span class="stage-number">11</span>
                    <div style="display: inline-block;">
                        <div class="stage-title">완료 검사</div>
                        <div class="stage-desc">인수인계</div>
                    </div>
                </div>
                <div class="stage" data-stage="12">
                    <span class="stage-number">12</span>
                    <div style="display: inline-block;">
                        <div class="stage-title">사후 관리</div>
                        <div class="stage-desc">유지보수 안내</div>
                    </div>
                </div>
            </div>
            
            <div class="chat-main">
                <div class="messages" id="messages">
                    <!-- 메시지가 여기에 동적으로 추가됩니다 -->
                </div>
                
                <div class="input-area">
                    <input type="text" id="userInput" placeholder="메시지를 입력하세요..." disabled>
                    <button onclick="sendMessage()" disabled>전송</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentStage = 1;
        let asData = {
            접수번호: null,
            접수일시: null,
            고객명: null,
            연락처: null,
            건물유형: null,
            주소: null,
            시공부위: null,
            증상: null,
            긴급도: null,
            보증기간: null,
            기존공법: null,
            시공일자: null,
            누수발생일: null,
            현장사진: [],
            추정원인: [],
            확정원인: null,
            보수방안: null,
            견적금액: null,
            시공일정: null,
            담당자: null
        };

        const stages = {
            1: initStage1,
            2: initStage2,
            3: initStage3,
            4: initStage4,
            5: initStage5,
            6: initStage6,
            7: initStage7,
            8: initStage8,
            9: initStage9,
            10: initStage10,
            11: initStage11,
            12: initStage12
        };

        // 초기화
        document.addEventListener('DOMContentLoaded', function() {
            initStage1();
            
            // 사이드바 스테이지 클릭 이벤트
            document.querySelectorAll('.stage').forEach(stage => {
                stage.addEventListener('click', function() {
                    const stageNum = parseInt(this.getAttribute('data-stage'));
                    if (stageNum <= currentStage) {
                        goToStage(stageNum);
                    } else {
                        addBotMessage('이전 단계를 먼저 완료해주세요.');
                    }
                });
            });
        });

        function addBotMessage(content) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.innerHTML = `
                <div class="avatar bot">🔧</div>
                <div class="message-content">${content}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addUserMessage(content) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            messageDiv.innerHTML = `
                <div class="message-content">${content}</div>
                <div class="avatar user">👤</div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addFormMessage(formHtml) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.innerHTML = `
                <div class="avatar bot">🔧</div>
                <div class="message-content" style="max-width: 85%;">${formHtml}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function goToStage(stageNum) {
            currentStage = stageNum;
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.querySelector(`.stage[data-stage="${stageNum}"]`).classList.add('active');
            
            if (stages[stageNum]) {
                stages[stageNum]();
            }
        }

        // 1단계: 초기 접수
        function initStage1() {
            addBotMessage(`
                <strong>🏗️ 방수 AS 접수를 시작합니다</strong><br><br>
                안녕하세요, 방수명장 AS 담당자입니다.<br>
                체계적인 하자 처리를 위해 순서대로 정보를 수집하겠습니다.<br><br>
                <div class="info-box">
                    <strong>📋 1단계: 초기 접수 정보</strong><br>
                    고객 기본정보와 현장 증상을 파악합니다.
                </div>
            `);

            const formHtml = `
                <form id="stage1Form" onsubmit="submitStage1(event)">
                    <div class="form-group">
                        <label>🏢 건물 유형 *</label>
                        <select id="buildingType" required>
                            <option value="">선택하세요</option>
                            <option value="아파트">아파트</option>
                            <option value="주택">단독/다가구 주택</option>
                            <option value="오피스텔">오피스텔</option>
                            <option value="상가">상가/근린생활시설</option>
                            <option value="빌딩">업무용 빌딩</option>
                            <option value="공장">공장/창고</option>
                            <option value="학교">학교/교육시설</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>📍 시공 부위 *</label>
                        <select id="location" required>
                            <option value="">선택하세요</option>
                            <option value="옥상">옥상</option>
                            <option value="욕실">욕실/화장실</option>
                            <option value="발코니">발코니/베란다</option>
                            <option value="외벽">외벽</option>
                            <option value="지하실">지하실</option>
                            <option value="지하주차장">지하주차장</option>
                            <option value="물탱크">물탱크</option>
                            <option value="테라스">테라스/옥상정원</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>💧 주요 증상 *</label>
                        <textarea id="symptoms" placeholder="예시: 천장에서 물이 떨어짐, 벽면에 곰팡이, 바닥이 축축함 등 구체적으로 작성해주세요" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>👤 고객명</label>
                        <input type="text" id="customerName" placeholder="홍길동">
                    </div>
                    
                    <div class="form-group">
                        <label>📞 연락처</label>
                        <input type="tel" id="phone" placeholder="010-1234-5678">
                    </div>
                    
                    <div class="form-group">
                        <label>🏠 주소</label>
                        <input type="text" id="address" placeholder="서울시 강남구...">
                    </div>
                    
                    <button type="submit" class="submit-btn">다음 단계로 →</button>
                </form>
            `;
            addFormMessage(formHtml);
        }

        function submitStage1(event) {
            event.preventDefault();
            
            asData.접수번호 = 'AS' + new Date().getTime();
            asData.접수일시 = new Date().toLocaleString('ko-KR');
            asData.건물유형 = document.getElementById('buildingType').value;
            asData.시공부위 = document.getElementById('location').value;
            asData.증상 = document.getElementById('symptoms').value;
            asData.고객명 = document.getElementById('customerName').value || '미입력';
            asData.연락처 = document.getElementById('phone').value || '미입력';
            asData.주소 = document.getElementById('address').value || '미입력';
            
            addUserMessage(`
                <strong>접수 정보 제출</strong><br>
                건물: ${asData.건물유형} / 부위: ${asData.시공부위}<br>
                증상: ${asData.증상.substring(0, 50)}...
            `);
            
            addBotMessage(`
                <div class="success-box">
                    <strong>✅ 접수 완료</strong><br>
                    접수번호: <strong>${asData.접수번호}</strong><br>

            if (message) {

        }
